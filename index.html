<!DOCTYPE html><html><head><meta charset="UTF-8"><title>PVC Geomembran ERP</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font:11px Segoe UI,sans-serif;background:#0f0c29;color:#e0e0e0;padding:5px}.login{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);display:flex;align-items:center;justify-content:center;z-index:9999}.login-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,215,0,.3);border-radius:20px;padding:35px;width:380px;text-align:center}.login-box h1{color:#ffd700;font-size:24px}.login-box input{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,215,0,.3);background:rgba(255,255,255,.05);color:#fff;font-size:13px;margin-bottom:10px;box-sizing:border-box}.login-box button{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e;font-size:15px;font-weight:bold;cursor:pointer}.login-err{color:#ff6b6b;font-size:11px;display:none}.hdr{text-align:center;padding:8px;background:linear-gradient(135deg,#1a1a3e,#2d2d6e);border-radius:12px;margin-bottom:5px}.hdr h1{font-size:16px;color:#ffd700}.bdg{background:#ffd700;color:#1a1a2e;padding:2px 10px;border-radius:15px;font-size:10px}.mbtn{background:#e74c3c;color:#fff;border:0;padding:5px 12px;border-radius:15px;font-size:11px;cursor:pointer}.sec{background:linear-gradient(135deg,#0f0c29,#302b63);border-radius:12px;padding:8px;border:1px solid rgba(255,255,255,.08);margin-bottom:5px}.sec h2{color:#ffd700;font-size:12px;margin-bottom:4px;text-align:center}.st{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}.ig{display:flex;align-items:center;gap:4px}.ig label{color:#aaa;font-size:10px}.ig input,.ig select{padding:3px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:10px;width:65px}table{width:100%;border-collapse:collapse;font-size:10px}th{background:rgba(255,215,0,.15);color:#ffd700;padding:3px;font-size:9px}td{padding:2px;text-align:center}td input{width:45px;padding:2px;border-radius:5px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:10px;text-align:center}.tr{background:rgba(255,215,0,.1)!important;font-weight:700;color:#ffd700}.cd{background:rgba(255,255,255,.05);border-radius:8px;padding:5px;margin-bottom:3px}.cd h3{color:#ffd700;font-size:10px}.si{display:flex;justify-content:space-between;font-size:10px}.l{color:#aaa}.v{color:#4fc3f7;font-weight:700}.vg{color:#00e676;font-weight:700}.vr{color:#ff7043;font-weight:700}.vy{color:#ffd700;font-weight:700}.ph{background:rgba(255,215,0,.15)!important}.btn{padding:5px 12px;border-radius:8px;border:0;font-size:10px;font-weight:700;cursor:pointer;margin:3px}.bg{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#1a1a2e}.bn{background:#00b894;color:#fff}.bb{background:#0984e3;color:#fff}.qf input,.qf textarea{width:100%;padding:3px;border-radius:6px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:#fff;font-size:10px}.qf label{color:#aaa;font-size:9px}</style></head><bod<div class="login" id="loginScreen"><div class="login-box"><h1>GEOSER ERP</h1><p style="color:#aaa;font-size:11px">PVC Geomembran Maliyet Sistemi</p><br><input type="email" id="loginEmail" placeholder="E-posta"><input type="password" id="loginPass" placeholder="Sifre"><div class="login-err" id="loginError">Hatali giris!</div><button onclick="doLogin()">Giris Yap</button></div></div><div id="appMain" style="display:none"><div class="hdr"><h1>PVC Geomembran ERP</h1><span class="bdg">v2.0</span> <button class="mbtn" id="mBtn" onclick="tglM()">Muzik</button></div><div class="sec"><h2>Kur Ayarlari</h2><div class="st"><div class="ig"><label>USD/TL:</label><input type="number" id="uR" value="18.79" step=".01" onchange="rc()"></div><div class="ig"><label>EUR/TL:</label><input type="number" id="eR" value="20.38" step=".01" onchange="rc()"></div><div class="ig"><label>Ozgul:</label><input type="number" id="oz" value="1.3" step=".01" onchange="rc()"></div><div class="ig"><label>Kar%:</label><input type="number" id="kr" value="22" step="1" onchange="rc()"></div><div class="ig"><label>Rulo:</label><input type="number" id="rw" value="6" step=".1" onchange="rc()"></div></div></div><div style="display:flex;gap:5px"><div style="flex:1.3"><div class="sec"><h2>Hammadde Tablosu</h2><table><thead><tr><th>#</th><th>Hammadde</th><th>PHR</th><th>$/kg</th><th>TL</th><th>$</th><th>EUR</th></tr></thead><tbody id="mb"></tbody></table></div></div><div style="flex:.7"><div class="sec"><h2>Analiz</h2><div id="ac"></div></div><div class="sec"><h2>Metraj</h2><div class="st" style="justify-content:flex-start"><div class="ig"><label>m2:</label><input type="number" id="mt" value="1000" onchange="rc()"></div><div class="ig"><label>mm:</label><select id="kl" onchange="rc()"><option value=".75">.75</option><option value="1" selected>1</option><option value="1.2">1.2</option><option value="1.5">1.5</option><option value="1.9">1.9</option><option value="2.5">2.5</option><option value="3">3</option></select></div></div><div id="mc"></div></div></div></div><div class="sec"><h2>Fiyat Listesi</h2><table><thead><tr><th>mm</th><th>kg/m2</th><th>M$</th><th>K$</th><th>S$</th><th>L$</th><th>ME</th><th>SE</th><th>MT</th><th>ST</th></tr></thead><tbody id="pb"></tbody></table></div><div style="display:flex;gap:5px"><div style="flex:1"><div class="sec"><h2>Grafik</h2><canvas id="cc" width="450" height="200"></canvas></div></div><div style="flex:1"><div class="sec"><h2>Teklif</h2><div class="qf" style="display:grid;grid-template-columns:1fr 1fr;gap:4px"><div><label>Musteri</label><input id="mA"></div><div><label>Firma</label><input id="fi"></div><div><label>Tel</label><input id="tl"></div><div><label>Mail</label><input id="ep"></div><div><label>Proje</label><input id="pA"></div><div><label>Tarih</label><input type="date" id="tT"></div><div style="grid-column:span 2"><label>Not</label><textarea id="nt" rows="2"></textarea></div></div><div style="text-align:center;margin-top:5px"><button class="btn bg" onclick="gQ()">Teklif</button><button class="btn bn" onclick="window.print()">Yazdir</button><button class="btn bb" onclick="eX()">Excel</button></div></div></div></div><div id="qP" class="sec" style="display:none"></div></div>y><script>var M=[{n:"PVC K70",p:75,r:1.75},{n:"DOTP",p:40,r:2.3},{n:"CZ1170",p:4,r:1.8},{n:"K125",p:2,r:3.6},{n:"STERIK ASIT",p:.5,r:5},{n:"BOYA",p:.5,r:8},{n:"KALSIT",p:25,r:.1},{n:"SOYA YAGI",p:3,r:2.7},{n:"ISCILIK",p:1,r:50},{n:"CPE 800",p:0,r:2.4},{n:"NITRIL",p:0,r:2.5},{n:"AMBALAJ",p:1,r:3},{n:"PALET",p:1,r:.25},{n:"ELEKTRIK",p:1,r:30}];function doLogin(){var e=document.getElementById("loginEmail").value.trim().toLowerCase(),p=document.getElementById("loginPass").value;if((e==="erdal@geoser.net"||e==="cengizhan@geoser.net")&&p==="geoser2026"){document.getElementById("loginScreen").style.display="none";document.getElementById("appMain").style.display="block";rc()}else{document.getElementById("loginError").style.display="block"}}function tglM(){var a=document.getElementById("bgM"),b=document.getElementById("mBtn");if(!a){a=document.createElement("audio");a.id="bgM";a.loop=true;a.volume=0.3;a.src="https://cdn.pixabay.com/download/audio/2022/01/18/audio_d0c6ff1bab.mp3";document.body.appendChild(a)}if(a.paused){a.play().catch(function(){});b.textContent="Kapat"}else{a.pause();b.textContent="Muzik"}}function uM(i,f,v){M[i][f]=parseFloat(v)||0;rc()}function dc(){var c=document.getElementById("cc");if(!c)return;var x=c.getContext("2d"),w=c.width,h=c.height;x.clearRect(0,0,w,h);var cs=M.filter(function(m){return m.p>0}).map(function(m){return{n:m.n,c:m.p*m.r}}).sort(function(a,b){return b.c-a.c});var t=cs.reduce(function(s,c){return s+c.c},0);var cl=["#ffd700","#ff6b6b","#4fc3f7","#00e676","#ff9800","#e040fb","#00bcd4","#8bc34a","#ff5722","#9c27b0"];var sa=-Math.PI/2,cx=110,cy=h/2,r=Math.min(cx,cy)-10;cs.forEach(function(c,i){var a=(c.c/t)*2*Math.PI;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,sa,sa+a);x.closePath();x.fillStyle=cl[i%10];x.fill();sa+=a});var ly=10;x.font="10px sans-serif";cs.forEach(function(c,i){x.fillStyle=cl[i%10];x.fillRect(240,ly,8,8);x.fillStyle="#e0e0e0";x.fillText(c.n+" ("+((c.c/t)*100).toFixed(1)+"%)",253,ly+8);ly+=14})}function rc(){var u=parseFloat(document.getElementById("uR").value)||1,e=parseFloat(document.getElementById("eR").value)||1,o=parseFloat(document.getElementById("oz").value)||1,k=parseFloat(document.getElementById("kr").value)||0,mt=parseFloat(document.getElementById("mt").value)||0,kl=parseFloat(document.getElementById("kl").value)||1;var tb=document.getElementById("mb");tb.innerHTML="";var tP=0,tU=0;M.forEach(function(m,i){var cU=m.p*m.r,cT=cU*u,cE=cU*u/e;tP+=m.p;tU+=cU;var r=document.createElement("tr");r.innerHTML="<td>"+(i+1)+"</td><td style=text-align:left>"+m.n+"</td><td><input type=number value="+m.p+" step=.1 onchange=uM("+i+",'p',this.value)></td><td><input type=number value="+m.r+" step=.01 onchange=uM("+i+",'r',this.value)></td><td>"+cT.toFixed(2)+"</td><td>$"+cU.toFixed(2)+"</td><td>"+cE.toFixed(2)+"</td>";tb.appendChild(r)});var tr=document.createElement("tr");tr.className="tr";tr.innerHTML="<td></td><td>TOPLAM</td><td>"+tP+"</td><td></td><td>"+(tU*u).toFixed(2)+"</td><td>$"+tU.toFixed(2)+"</td><td>"+(tU*u/e).toFixed(2)+"</td>";tb.appendChild(tr);var kU=tU/tP,w2=kl*o,cU2=kU*w2,mk=cU2*(k/100),ms=cU2+mk,msE=ms*u/e,msT=ms*u;document.getElementById("ac").innerHTML="<div class=cd><h3>Maliyetler</h3><div class=si><span class=l>1kg TL</span><span class=v>"+(kU*u).toFixed(2)+"</span></div><div class=si><span class=l>1kg $</span><span class=v>$"+kU.toFixed(2)+"</span></div><div class=si><span class=l>kg/m2</span><span class=v>"+w2.toFixed(3)+"</span></div><div class=si><span class=l>m2 $</span><span class=v>$"+cU2.toFixed(2)+"</span></div></div><div class=cd><h3>Satis</h3><div class=si><span class=l>$/m2</span><span class=vg>$"+ms.toFixed(2)+"</span></div><div class=si><span class=l>E/m2</span><span class=vg>"+msE.toFixed(2)+"</span></div><div class=si><span class=l>TL/m2</span><span class=vg>"+msT.toFixed(2)+"</span></div></div>";var tM=cU2*u*mt,tS=msT*mt;document.getElementById("mc").innerHTML="<div class=cd><h3>Sonuc</h3><div class=si><span class=l>Alan</span><span class=v>"+mt+" m2</span></div><div class=si><span class=l>Agirlik</span><span class=v>"+(w2*mt).toFixed(0)+" kg</span></div><div class=si><span class=l>Maliyet</span><span class=vr>"+tM.toFixed(2)+"</span></div><div class=si><span class=l>Satis</span><span class=vg>"+tS.toFixed(2)+"</span></div><div class=si><span class=l>Kar</span><span class=vy>"+(tS-tM).toFixed(2)+"</span></div></div>";var ts=[.75,1,1.2,1.5,1.9,2.5,3],pb=document.getElementById("pb");pb.innerHTML="";ts.forEach(function(t){var w=t*o,c=kU*w,ka=c*(k/100),s=c+ka;var r=document.createElement("tr");if(t==kl)r.className="ph";r.innerHTML="<td>"+t.toFixed(2)+"</td><td>"+w.toFixed(3)+"</td><td>$"+c.toFixed(2)+"</td><td>$"+ka.toFixed(2)+"</td><td>$"+s.toFixed(2)+"</td><td>$"+(s*1.1).toFixed(2)+"</td><td>"+(c*u/e).toFixed(2)+"</td><td>"+(s*u/e).toFixed(2)+"</td><td>"+(c*u).toFixed(2)+"</td><td>"+(s*u).toFixed(2)+"</td>";pb.appendChild(r)});dc()}function gQ(){var p=document.getElementById("qP"),kl=parseFloat(document.getElementById("kl").value),mt=parseFloat(document.getElementById("mt").value),u=parseFloat(document.getElementById("uR").value);var tU=0,tP=0;M.forEach(function(m){tU+=m.p*m.r;tP+=m.p});var kU=tU/tP,o=parseFloat(document.getElementById("oz").value),k=parseFloat(document.getElementById("kr").value),w=kl*o,s=kU*w*(1+k/100),sT=s*u;p.style.display="block";p.style.background="#fff";p.style.color="#333";p.innerHTML="<h2 style=color:#1a1a2e>TEKLIF</h2><p>Musteri: "+document.getElementById("mA").value+"</p><table style=width:100%;border-collapse:collapse><tr style=background:#1a1a2e;color:#ffd700><th>Urun</th><th>mm</th><th>m2</th><th>$/m2</th><th>TL/m2</th><th>Top$</th><th>TopTL</th></tr><tr style=text-align:center><td>PVC Geomembran</td><td>"+kl+"</td><td>"+mt+"</td><td>$"+s.toFixed(2)+"</td><td>"+sT.toFixed(2)+"</td><td>$"+(s*mt).toFixed(2)+"</td><td>"+(sT*mt).toFixed(2)+"</td></tr></table>"}function eX(){var csv="Hammadde;PHR;$/kg;TL;$;EUR\n";var u=parseFloat(document.getElementById("uR").value),e=parseFloat(document.getElementById("eR").value);M.forEach(function(m){csv+=m.n+";"+m.p+";"+m.r+";"+(m.p*m.r*u).toFixed(2)+";"+(m.p*m.r).toFixed(2)+";"+(m.p*m.r*u/e).toFixed(2)+"\n"});var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="maliyet.csv";a.click()}</script></body></html>
